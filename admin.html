<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Display BPS Tuban</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f3f6fa;
      color: #172033;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: min(920px, calc(100% - 32px));
      margin: 32px auto;
    }

    header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      color: #063970;
      font-size: 30px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #526070;
      font-size: 16px;
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 18px;
      padding: 24px;
      border: 1px solid #d7dee8;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 12px 14px;
      color: #111827;
      font: inherit;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.5;
    }

    .hint {
      color: #64748b;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button,
    .button-link {
      border: 0;
      border-radius: 6px;
      padding: 12px 18px;
      background: #063970;
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
    }

    .button-link {
      background: #1f9d55;
    }

    .status {
      min-height: 24px;
      color: #0f766e;
      font-weight: 700;
    }

    .status.error {
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>Admin Display BPS Tuban</h1>
      <p>Ubah playlist video, alamat website antrian, dan running text tanpa membuka file HTML.</p>
    </header>

    <form id="settingsForm">
      <label>
        ID Playlist YouTube
        <input id="playlistId" name="playlistId" autocomplete="off" required>
        <span class="hint">Boleh isi ID saja, misalnya PLxLhy..., atau paste URL playlist YouTube lengkap.</span>
      </label>

      <label>
        URL Website Antrian
        <input id="queueUrl" name="queueUrl" type="url" required>
        <span class="hint">Contoh: https://antri.bpstuban.my.id/qr</span>
      </label>

      <label>
        Running Text
        <textarea id="tickerText" name="tickerText" required></textarea>
      </label>

      <div class="actions">
        <button type="submit">Simpan Pengaturan</button>
        <a class="button-link" href="/" target="_blank" rel="noopener">Buka Display</a>
        <span class="status" id="status"></span>
      </div>
    </form>
  </main>

  <script>
    const form = document.getElementById("settingsForm");
    const statusEl = document.getElementById("status");

    function showStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    async function loadSettings() {
      const response = await fetch("/api/config", { cache: "no-store" });
      const config = await response.json();
      form.playlistId.value = config.playlistId || "";
      form.queueUrl.value = config.queueUrl || "";
      form.tickerText.value = config.tickerText || "";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      showStatus("Menyimpan...");

      const payload = {
        playlistId: form.playlistId.value.trim(),
        queueUrl: form.queueUrl.value.trim(),
        tickerText: form.tickerText.value.trim()
      };

      try {
        const response = await fetch("/api/config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (!response.ok) {
          throw new Error(result.error || "Pengaturan gagal disimpan");
        }

        form.playlistId.value = result.playlistId;
        showStatus("Pengaturan tersimpan. Display akan memperbarui otomatis maksimal 30 detik.");
      } catch (error) {
        showStatus(error.message, true);
      }
    });

    loadSettings().catch(() => {
      showStatus("Gagal memuat pengaturan", true);
    });
  </script>
</body>
</html>
